services:
  web:
    build: .
    image: node:22-alpine
    user: root
    ports:
      - "3000:3000"
    volumes:
      - .:/app:Z
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run dev -- -H 0.0.0.0"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/main_db
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  worker:
    build: .
    user: root
    # 🛠️ ট্রিক ১: ডকারকে সরাসরি ওয়ার্কিং ডিরেক্টরি সেট করে দিন
    working_dir: /app
    # 🛠️ ট্রিক ২: cd করার ঝামেলা বাদ, সরাসরি ফাইল রান করুন
    command: tsx ./src/worker.ts
    volumes:
      - .:/app:Z # বড় হাতের Z-ই থাকবে SELinux এর জন্য
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://rabbitmq
      - DATABASE_URL=postgresql://user:password@db:5432/main_db
    depends_on:
      rabbitmq:
        condition: service_started
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: main_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d main_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata: