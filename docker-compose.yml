# docker-compose.yml
services:
  web:
    build: .
    # image: node:22-alpine
    # Run the web process as the host user so it can read mounted files under rootless/SELinux setups
    user: root  
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src:z
      - ./prisma:/app/prisma:z
      - ./next.config.ts:/app/next.config.ts:z
      - /app/node_modules
    # Run the Next dev server directly (prisma generate happens at image build time)
    command: ["sh", "-c", "npx prisma migrate deploy && npm run dev -- -H 0.0.0.0"]
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/main_db
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq
      - NEXT_PUBLIC_WEBSOCKET_URL=http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  worker:
    build: .
    user: root
    working_dir: /app
    command: tsx ./src/worker.ts
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - WEBSOCKET_URL=http://websocket:3000
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq
      - DATABASE_URL=postgresql://user:password@db:5432/main_db
    depends_on:
      rabbitmq:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
  db:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: main_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d main_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  websocket:
    build: .
    user: root
    working_dir: /app
    command: tsx ./src/websocket/server.ts
    ports:
      - "3001:3000"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - PORT=3000
      - WEBSOCKET_CORS_ORIGIN=*
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

volumes:
  pgdata: